<div class="home-container">
  <header class="home-header">
    <h1 class="premium-title">Bienvenido a <span class="brand-text">STYLII</span></h1>
    <p>La precisión de hoy define el éxito de mañana.</p>
  </header>

  <div class="stats-grid">
    @for (stat of stats(); track stat.label) {
      <div class="glass-card stat-card">
        <div class="stat-icon">{{ stat.icon }}</div>
        <div class="stat-info">
          <span class="label">{{ stat.label }}</span>
          <span class="value">{{ stat.value }}</span>
          <span class="trend" [class.positive]="stat.trend.startsWith('+')">
            {{ stat.trend }} vs mes pasado
          </span>
        </div>
      </div>
    }
  </div>

  <div class="main-sections">
    <div class="glass-card upcoming-appointments">
      <h3>Próximas Citas</h3>
      <div class="placeholder-content">
        <p>No hay citas próximas para mostrar.</p>
      </div>
    </div>
    
    <div class="glass-card quick-actions">
      <h3>Acciones Rápidas</h3>
      <div class="actions-grid">
        <button class="btn-action">Nueva Cita</button>
        <button class="btn-action">Agregar Servicio</button>
        <button class="btn-action">Ver Reportes</button>
      </div>
    </div>
  </div>
</div>
