<div class="auth-page">
  <div class="glass-card register-container">
    <div class="register-header">
      <h1 class="premium-title brand-text">REGISTRA TU NEGOCIO EN STYLII</h1>
      <p class="subtitle">La precisión que tu marca necesita</p>
    </div>

    <form (submit)="handleRegister()" class="register-form" autocomplete="off">
      <!-- Sección Personal -->
      <div class="form-section">
        <h3>Información del Dueño</h3>
        <div class="input-group">
          <label>Nombre Completo</label>
          <input type="text" [(ngModel)]="fullName" name="fullName" placeholder="Ej. Juan Pérez" autocomplete="off" required>
        </div>
        <div class="input-row">
          <div class="input-group">
            <label>Email</label>
            <input type="email" [(ngModel)]="email" name="email" placeholder="juan@ejemplo.com" autocomplete="off" required>
          </div>
          <div class="input-group password-group">
            <label>Contraseña</label>
            <div class="password-wrapper">
              <input [type]="showPassword() ? 'text' : 'password'" [(ngModel)]="password" name="password" placeholder="••••••••" autocomplete="new-password" required>
              <button type="button" class="toggle-pwd-btn" (click)="togglePassword()">
                <lucide-icon [img]="showPassword() ? EyeOff : Eye" size="20"></lucide-icon>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Sección Negocio -->
      <div class="form-section">
        <h3>Tu Negocio</h3>
        <div class="input-group">
          <label>Nombre de tu Negocio</label>
          <input type="text" [(ngModel)]="businessName" name="businessName" placeholder="Introduce el nombre de tu Negocio o Empresa" autocomplete="off" required>
        </div>
      </div>

      @if (errorMessage()) {
        <div class="error-msg">{{ errorMessage() }}</div>
      }

      <button type="submit" class="btn-premium" [disabled]="loading()">
        {{ loading() ? 'Creando tu cuenta...' : 'Finalizar Registro y Abrir Panel' }}
      </button>

      <div class="auth-footer">
        <p>¿Ya tienes cuenta? <a routerLink="/auth/login" class="brand-text">Inicia Sesión</a></p>
      </div>
    </form>
  </div>
</div>
