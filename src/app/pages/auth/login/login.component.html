<div class="auth-page">
  <div class="glass-card login-container">
    <div class="login-header">
      <h1 class="premium-title brand-text">STYLII</h1>
      <p class="subtitle">Precision Management Software</p>
    </div>

    <form (submit)="handleLogin()" class="login-form">
      <div class="input-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          [(ngModel)]="email" 
          name="email" 
          placeholder="tu@email.com"
          required
        >
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          [(ngModel)]="password" 
          name="password" 
          placeholder="••••••••"
          required
        >
      </div>

      @if (errorMessage()) {
        <div class="error-msg">{{ errorMessage() }}</div>
      }

      <button type="submit" class="btn-premium" [disabled]="loading()">
        {{ loading() ? 'Iniciando...' : 'Entrar al Panel' }}
      </button>

      <div class="auth-footer">
        <p>¿Eres nuevo? <a routerLink="/auth/register" class="brand-text">Registra tu Negocio</a></p>
      </div>
    </form>
  </div>
</div>
